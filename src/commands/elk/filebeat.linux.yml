filebeat.inputs:
- type: udp
  max_message_size: 10KiB
  host: "0.0.0.0:514"
  processors:
    - syslog:
        field: message

- type: filestream
  id: jj-check-daemon
  paths:
    - "/var/log/jj-check-daemon.json"
  parsers:
    - ndjson:
        target: check

- type: filestream
  id: clamav
  paths:
    - "/var/log/clamd.log"
    - "/var/log/clamav/clamav.log"

processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_docker_metadata: ~

setup.template.settings.index.number_of_shards: 1

filebeat.config.modules.path: $FILEBEAT_PATH/modules.d/*.yml

logging.level: warning

filebeat.modules:
  - module: system
    syslog:
      enabled: true
    auth:
      enabled: true

  - module: suricata
    eve:
      enabled: true
      paths: ["/var/log/suricata/eve.json"]

